version: '3.8'

services:
  # PostgreSQL Database (shared by all agents)
  postgres:
    image: postgres:16-alpine
    container_name: trading-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading_agent
      POSTGRES_PASSWORD: ${TRADING_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stock Agent (SPY/QQQ via Alpaca)
  stock-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: stock-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AGENT_TYPE=stock
      - AGENT_SYMBOLS=SPY,QQQ
    volumes:
      - ./journal:/app/journal
      - ./logs:/app/logs
      - ./data:/app/data
    command: python3 -m src.agent --loop --interval 2

  # Futures Agent (MES/MNQ via IBKR)
  futures-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: futures-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ibkr-gateway:
        condition: service_started
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - IBKR_PAPER_USERNAME=${IBKR_PAPER_USERNAME}
      - IBKR_PAPER_PASSWORD=${IBKR_PAPER_PASSWORD}
      - IBKR_PAPER_PORT=${IBKR_PAPER_PORT}
      - AGENT_TYPE=futures
    volumes:
      - ./journal:/app/journal
      - ./logs:/app/logs
      - ./data:/app/data
    command: python3 -m futures.futures_agent --loop --interval 2 --ibkr

  # IBKR Gateway (for futures trading)
  ibkr-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ibkr-gateway
    restart: unless-stopped
    environment:
      - TWS_USERID=${IBKR_PAPER_USERNAME}
      - TWS_PASSWORD=${IBKR_PAPER_PASSWORD}
      - TRADING_MODE=paper
      - VNC_SERVER_PASSWORD=ibkr_vnc
    ports:
      - "4002:4002"  # Gateway port
      - "5900:5900"  # VNC port (for debugging)
    volumes:
      - ibkr_settings:/root/Jts

  # Discord Monitor (captures trading signals)
  discord-monitor:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: discord-monitor
    restart: unless-stopped
    environment:
      - DISCORD_USER_TOKEN=${DISCORD_USER_TOKEN}
    volumes:
      - ./discord_history:/app/discord_history
      - ./journal:/app/journal
      - ./logs:/app/logs
    command: python3 -m discord.discord_bot_monitor

  # Options Agent (future - placeholder)
  # options-agent:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.agent
  #   container_name: options-agent
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     - ALPACA_API_KEY=${ALPACA_API_KEY}
  #     - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
  #     - DATABASE_URL=${DATABASE_URL}
  #     - AGENT_TYPE=options
  #   volumes:
  #     - ./journal:/app/journal
  #     - ./logs:/app/logs
  #   command: python3 -m src.options_agent --loop

volumes:
  postgres_data:
    driver: local
  ibkr_settings:
    driver: local

networks:
  default:
    name: trading-network
